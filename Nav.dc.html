<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  .promin-navlink { position: relative; text-decoration: none; padding: 4px 2px; }
  .promin-navlink::after { content: ''; position: absolute; left: 0; bottom: -3px; height: 2px; width: 0; background: #DE694E; border-radius: 2px; transition: width .32s cubic-bezier(.2,.7,.2,1); }
  .promin-navlink:hover { color: #EDEFF2 !important; }
  .promin-navlink:hover::after, .promin-navlink.is-active::after { width: 100%; }
</style>
</helmet>
<header ref="{{ headerRef }}" style="position:fixed;top:0;left:0;right:0;z-index:900;display:flex;align-items:center;justify-content:space-between;padding:18px clamp(20px,5vw,64px);font-family:'Sora',sans-serif;transition:background .4s ease,padding .4s ease,border-color .4s ease;background:rgba(21,26,31,0);border-bottom:1px solid rgba(217,220,224,0)">
  <a href="Inicio.dc.html" style="display:flex;align-items:center;flex-shrink:0">
    <img src="logo-full.png" alt="ProMin" style="height:32px;width:auto;display:block" />
  </a>

  <nav style="display:flex;align-items:center;gap:clamp(14px,2.2vw,34px)" data-desktop-nav>
    <sc-for list="{{ links }}" as="lk" hint-placeholder-count="6">
      <a href="{{ lk.href }}" class="{{ lk.cls }}" style="{{ lk.style }};white-space:nowrap">{{ lk.label }}</a>
    </sc-for>
  </nav>

  <div style="display:flex;align-items:center;gap:16px;flex-shrink:0">
    <div style="display:flex;align-items:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.5px;border:1px solid rgba(217,220,224,.22);border-radius:999px;overflow:hidden">
      <button onClick="{{ setPT }}" style="{{ ptStyle }}">PT</button>
      <button onClick="{{ setES }}" style="{{ esStyle }}">ES</button>
    </div>
    <a href="Contato.dc.html" style="display:inline-flex;align-items:center;gap:8px;background:#DE694E;color:#151A1F;font-weight:700;font-size:13px;padding:11px 20px;border-radius:999px;letter-spacing:.2px;transition:transform .25s ease,box-shadow .25s ease" style-hover="transform:translateY(-2px);box-shadow:0 10px 26px rgba(222,105,78,.4)" data-hide-mobile>{{ L.cta }}</a>
    <button onClick="{{ toggleMenu }}" aria-label="Menu" data-burger style="display:none;flex-direction:column;gap:5px;background:none;border:0;cursor:pointer;padding:6px">
      <span style="{{ burgerTop }}"></span>
      <span style="{{ burgerMid }}"></span>
      <span style="{{ burgerBot }}"></span>
    </button>
  </div>
</header>

<div ref="{{ overlayRef }}" style="{{ overlayStyle }}">
  <sc-for list="{{ links }}" as="lk" hint-placeholder-count="6">
    <a href="{{ lk.href }}" style="font-family:'Sora',sans-serif;font-size:34px;font-weight:700;color:#EDEFF2;display:flex;align-items:baseline;gap:14px" style-hover="color:#DE694E">{{ lk.label }}</a>
  </sc-for>
  <a href="Contato.dc.html" style="margin-top:14px;background:#DE694E;color:#151A1F;font-family:'Sora',sans-serif;font-weight:700;font-size:16px;padding:15px 30px;border-radius:999px">{{ L.cta }}</a>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:90},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;inicio&quot;,&quot;sobre&quot;,&quot;servicos&quot;,&quot;areas&quot;,&quot;processo&quot;,&quot;contato&quot;],&quot;default&quot;:&quot;inicio&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { menu: false };
  headerRef = React.createRef();
  overlayRef = React.createRef();

  lang() { try { return localStorage.getItem('promin_lang') === 'es' ? 'es' : 'pt'; } catch (e) { return 'pt'; } }
  set(l) { try { localStorage.setItem('promin_lang', l); } catch (e) {} location.reload(); }

  componentDidMount() {
    const hd = this.headerRef.current;
    const onScroll = () => {
      if (!hd) return;
      if (window.scrollY > 24) {
        hd.style.background = 'rgba(21,26,31,.86)';
        hd.style.backdropFilter = 'blur(14px)';
        hd.style.webkitBackdropFilter = 'blur(14px)';
        hd.style.borderBottomColor = 'rgba(217,220,224,.10)';
        hd.style.padding = '12px clamp(20px,5vw,64px)';
      } else {
        hd.style.background = 'rgba(21,26,31,0)';
        hd.style.backdropFilter = 'none';
        hd.style.webkitBackdropFilter = 'none';
        hd.style.borderBottomColor = 'rgba(217,220,224,0)';
        hd.style.padding = '18px clamp(20px,5vw,64px)';
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();

    // responsive: show burger / hide desktop nav under 900px
    const mq = window.matchMedia('(max-width: 900px)');
    const apply = () => {
      const nav = hd && hd.querySelector('[data-desktop-nav]');
      const burger = hd && hd.querySelector('[data-burger]');
      const ctaM = hd && hd.querySelector('[data-hide-mobile]');
      if (nav) nav.style.display = mq.matches ? 'none' : 'flex';
      if (burger) burger.style.display = mq.matches ? 'flex' : 'none';
      if (ctaM) ctaM.style.display = mq.matches ? 'none' : 'inline-flex';
    };
    apply();
    mq.addEventListener('change', apply);
    this._mq = mq; this._apply = apply;
  }

  renderVals() {
    const lang = this.lang();
    const dict = {
      pt: { cta: 'Fale conosco', items: ['Início', 'Sobre', 'Serviços', 'Áreas de Atuação', 'Processo', 'Contato'] },
      es: { cta: 'Contáctanos', items: ['Inicio', 'Nosotros', 'Servicios', 'Áreas', 'Proceso', 'Contacto'] },
    };
    const L = dict[lang];
    const hrefs = ['Inicio.dc.html', 'Sobre.dc.html', 'Servicos.dc.html', 'Areas.dc.html', 'Processo.dc.html', 'Contato.dc.html'];
    const keys = ['inicio', 'sobre', 'servicos', 'areas', 'processo', 'contato'];
    const active = this.props.active || 'inicio';
    const base = "font-family:'Sora',sans-serif;font-size:15px;font-weight:500;letter-spacing:.2px;color:#C9CDD2;transition:color .25s ease;display:inline-flex;align-items:center";
    const links = L.items.map((label, i) => ({
      label, href: hrefs[i], num: '0' + (i + 1),
      cls: 'promin-navlink' + (keys[i] === active ? ' is-active' : ''),
      style: base + (keys[i] === active ? ';color:#EDEFF2' : ''),
    }));
    const langBtn = (on) => `background:${on ? '#DE694E' : 'transparent'};color:${on ? '#151A1F' : '#C9CDD2'};border:0;padding:6px 12px;cursor:pointer;font:inherit;transition:background .2s ease,color .2s ease`;
    const bl = 'display:block;width:24px;height:2px;background:#EDEFF2;border-radius:2px;transition:transform .3s ease,opacity .3s ease';
    const open = this.state.menu;
    return {
      L, links, headerRef: this.headerRef, overlayRef: this.overlayRef,
      setPT: () => this.set('pt'), setES: () => this.set('es'),
      ptStyle: langBtn(lang === 'pt'), esStyle: langBtn(lang === 'es'),
      toggleMenu: () => this.setState(s => ({ menu: !s.menu })),
      burgerTop: bl + (open ? ';transform:translateY(7px) rotate(45deg)' : ''),
      burgerMid: bl + (open ? ';opacity:0' : ''),
      burgerBot: bl + (open ? ';transform:translateY(-7px) rotate(-45deg)' : ''),
      overlayStyle: `position:fixed;inset:0;z-index:890;background:rgba(15,20,25,.98);backdrop-filter:blur(8px);display:flex;flex-direction:column;justify-content:center;gap:22px;padding:0 clamp(24px,8vw,80px);transition:opacity .4s ease,transform .5s ease;opacity:${open ? '1' : '0'};transform:translateY(${open ? '0' : '-12px'});pointer-events:${open ? 'auto' : 'none'}`,
    };
  }
}

</script>
</body>
</html>
