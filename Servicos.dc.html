<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="./symbol.png">
<link rel="apple-touch-icon" href="./symbol.png">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: #1A2026; color: #EDEFF2; }
  a { color: #DE694E; text-decoration: none; }
  a:hover { color: #E8714F; }
  ::selection { background: #DE694E; color: #151A1F; }
  @keyframes promin-blink { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
</style>
</helmet>

<div style="font-family:'Sora',sans-serif;background:#1A2026;overflow-x:hidden">
  <div data-progress style="position:fixed;top:0;left:0;height:3px;width:100%;background:#DE694E;transform:scaleX(0);transform-origin:0 50%;z-index:950"></div>
  <dc-import name="Nav" active="servicos" hint-size="100%,90px"></dc-import>

  <section style="position:relative;padding:170px clamp(20px,5vw,64px) 60px;background:radial-gradient(110% 80% at 80% 0%, #22303f 0%, #1A2026 60%);overflow:hidden">
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(217,220,224,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(217,220,224,.04) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(circle at 70% 20%,#000,transparent 75%);-webkit-mask-image:radial-gradient(circle at 70% 20%,#000,transparent 75%)"></div>
    <div style="position:relative;max-width:1160px;margin:0 auto">
      <div data-reveal="up" style="display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#DE694E;margin-bottom:26px"><span style="width:8px;height:8px;background:#DE694E;border-radius:50%;animation:promin-blink 2s infinite"></span>{{ L.kicker }}</div>
      <h1 data-reveal="up" data-reveal-delay="80" style="font-size:clamp(34px,5.5vw,68px);line-height:1.04;font-weight:700;letter-spacing:-1.5px;margin:0 0 22px;max-width:16ch;color:#F4F6F8">{{ L.title }}</h1>
      <p data-reveal="up" data-reveal-delay="150" style="font-size:clamp(16px,1.5vw,19px);line-height:1.6;color:#A9B0B8;font-weight:300;max-width:52ch;margin:0">{{ L.lede }}</p>
    </div>
  </section>

  <!-- SERVICES GRID -->
  <section style="padding:clamp(40px,6vw,80px) clamp(20px,5vw,64px) clamp(60px,8vw,110px);max-width:1200px;margin:0 auto">
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:22px" data-svc-grid>
      <sc-for list="{{ services }}" as="s" hint-placeholder-count="10">
        <div data-reveal="up" data-reveal-delay="{{ s.delay }}" style="display:flex;flex-direction:column;background:#12171C;border:1px solid rgba(217,220,224,.08);border-radius:18px;padding:36px 32px;transition:border-color .35s ease,transform .35s ease" style-hover="border-color:rgba(222,105,78,.45);transform:translateY(-5px)">
          <div style="display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:12px;background:rgba(222,105,78,.12);border:1px solid rgba(222,105,78,.28);margin-bottom:22px;flex:none">
            <span style="width:18px;height:13px;background:#DE694E;transform:skewX(-24deg);display:inline-block"></span>
          </div>
          <h3 style="font-size:21px;font-weight:700;margin:0 0 12px;color:#F4F6F8;letter-spacing:-.3px;line-height:1.25">{{ s.title }}</h3>
          <p style="font-size:14.5px;line-height:1.65;color:#8A9199;margin:0 0 20px;flex:1">{{ s.desc }}</p>
          <div style="display:flex;flex-direction:column;gap:9px;border-top:1px solid rgba(217,220,224,.08);padding-top:18px">
            <sc-for list="{{ s.items }}" as="it" hint-placeholder-count="4">
              <span style="display:flex;align-items:flex-start;gap:10px;font-size:13.5px;color:#C9CDD2;line-height:1.5"><span style="flex:none;width:6px;height:6px;background:#DE694E;transform:skewX(-24deg);display:inline-block;margin-top:6px"></span>{{ it }}</span>
            </sc-for>
          </div>
        </div>
      </sc-for>
    </div>
  </section>

  <!-- TECH FEATURE ROW -->
  <section style="background:#12171C;padding:clamp(60px,8vw,110px) clamp(20px,5vw,64px)">
    <div style="max-width:1160px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:clamp(30px,5vw,64px);align-items:center" data-tech-grid>
      <div>
        <div data-reveal="up" style="font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#DE694E;margin-bottom:20px">// {{ L.techKicker }}</div>
        <h2 data-reveal="up" data-reveal-delay="70" style="font-size:clamp(26px,3.4vw,42px);font-weight:700;letter-spacing:-1px;line-height:1.1;margin:0 0 20px;color:#F4F6F8">{{ L.techTitle }}</h2>
        <p data-reveal="up" data-reveal-delay="140" style="font-size:16px;line-height:1.7;color:#A9B0B8;margin:0 0 28px;max-width:48ch">{{ L.techBody }}</p>
        <div style="display:flex;flex-direction:column;gap:14px" data-reveal="up" data-reveal-delay="200">
          <sc-for list="{{ techPoints }}" as="tp" hint-placeholder-count="3">
            <div style="display:flex;align-items:center;gap:14px;font-size:15.5px;color:#EDEFF2"><span style="width:9px;height:9px;background:#DE694E;transform:skewX(-24deg);flex:none;display:inline-block"></span>{{ tp }}</div>
          </sc-for>
        </div>
      </div>
      <div data-reveal="left" style="position:relative;border-radius:20px;overflow:hidden;aspect-ratio:4/3;box-shadow:0 26px 70px rgba(0,0,0,.45)">
        <img data-parallax="0.08" src="tech-monitors.jpg" alt="" style="position:absolute;inset:-8% 0;width:100%;height:116%;object-fit:cover" />
        <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(18,23,28,.55))"></div>
      </div>
    </div>
  </section>

  <dc-import name="CtaBand" hint-size="100%,360px"></dc-import>
  <dc-import name="Footer" hint-size="100%,420px"></dc-import>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}">
class Component extends DCLogic {
  lang() { try { return localStorage.getItem('promin_lang') === 'es' ? 'es' : 'pt'; } catch (e) { return 'pt'; } }
  componentDidMount() { import('./site.js').then(m => m.initMotion()).catch(() => {}); }
  renderVals() {
    const lang = this.lang();
    const pt = {
      kicker: 'Nossos Serviços', title: 'Soluções técnicas para cada etapa da operação.',
      lede: 'Do projeto da planta à manutenção, da otimização da produção à compra de equipamentos — atuamos onde o resultado é gerado.',
      services: [
        { title: 'Projetos de Plantas de Britagem', desc: 'Projetamos plantas novas ou otimizamos instalações existentes, buscando o melhor equilíbrio entre investimento, capacidade produtiva e custo operacional.', items: ['Estudos de viabilidade', 'Layout da planta', 'Balanço de massas', 'Projetos executivos', 'Acompanhamento da implantação'] },
        { title: 'Manutenção Preventiva', desc: 'Estruturamos programas de manutenção para reduzir falhas e aumentar a disponibilidade dos equipamentos.', items: ['Cadastro de ativos', 'Planos preventivos', 'Indicadores de manutenção', 'Redução de paradas inesperadas'] },
        { title: 'Manutenção Preditiva', desc: 'Antecipamos falhas antes que elas interrompam a produção.', items: ['Análise de vibração, temperatura e pressão', 'Ensaios não destrutivos', 'Líquido penetrante', 'Raio X', 'Medição de dureza'] },
        { title: 'Manutenção Corretiva', desc: 'Especialistas em equipamentos de britagem das principais marcas do mercado.', items: ['Diagnóstico técnico', 'Supervisão de reformas', 'Relatórios técnicos', 'Suporte em campo'] },
        { title: 'Otimização de Produção', desc: 'Melhoramos o desempenho da planta através da análise do processo produtivo.', items: ['Identificação de gargalos', 'Aumento de capacidade', 'Redução de desgaste', 'Melhoria do fluxo de produção'] },
        { title: 'Gestão de Custos e Estoques', desc: 'Reduzimos capital parado sem comprometer a disponibilidade da planta.', items: ['Estoque de segurança', 'Classificação de peças críticas', 'Gestão de fornecedores', 'Redução dos custos operacionais'] },
        { title: 'Engenharia e Projetos', desc: 'Desenvolvemos soluções sob medida para fabricação e melhorias industriais.', items: ['Desenhos técnicos', 'Projetos mecânicos', 'Projetos de fabricação', 'Relatórios de engenharia'] },
        { title: 'Treinamentos', desc: 'Capacitamos equipes para operar e manter equipamentos com maior eficiência.', items: ['Operadores', 'Mecânicos', 'Compradores técnicos', 'Equipes de manutenção'] },
        { title: 'Consultoria em Compras', desc: 'Apoiamos decisões técnicas para aquisição de equipamentos, peças e serviços.', items: ['Especificação técnica', 'Avaliação de fornecedores', 'Análise de custo-benefício', 'Acompanhamento de fabricação'] },
        { title: 'Reforma e Comercialização de Equipamentos', desc: 'Acompanhamos projetos de reforma e fornecimento de equipamentos novos e usados.', items: ['Reforma de britadores', 'Recuperação de componentes', 'Equipamentos novos', 'Equipamentos seminovos'] },
      ],
      techKicker: 'Tecnologia', techTitle: 'Tecnologia especializada que gera performance.',
      techBody: 'Unimos expertise de campo e ferramentas modernas para monitorar, analisar e otimizar cada processo — transformando dados em decisões que impulsionam resultados.',
      techPoints: ['Monitoramento e análise de processos', 'Decisões orientadas por dados', 'Melhoria contínua da operação'],
    };
    const es = {
      kicker: 'Nuestros Servicios', title: 'Soluciones técnicas para cada etapa de la operación.',
      lede: 'Del diseño de la planta al mantenimiento, de la optimización de la producción a la compra de equipos — actuamos donde se genera el resultado.',
      services: [
        { title: 'Diseño e Ingeniería de Plantas de Trituración', desc: 'Diseñamos nuevas plantas u optimizamos instalaciones existentes, buscando el mejor equilibrio entre inversión, capacidad de producción y costos operativos.', items: ['Estudios de viabilidad', 'Diseño del layout de la planta', 'Balance de masas', 'Ingeniería de detalle', 'Supervisión de la implementación'] },
        { title: 'Mantenimiento Preventivo', desc: 'Implementamos programas de mantenimiento para reducir fallas y aumentar la disponibilidad de los equipos.', items: ['Registro de activos', 'Planes de mantenimiento preventivo', 'Indicadores de mantenimiento', 'Reducción de paradas no programadas'] },
        { title: 'Mantenimiento Predictivo', desc: 'Detectamos fallas antes de que afecten la producción.', items: ['Análisis de vibraciones, temperatura y presión', 'Ensayos no destructivos', 'Líquidos penetrantes', 'Radiografía industrial', 'Verificación de dureza'] },
        { title: 'Mantenimiento Correctivo', desc: 'Especialistas en equipos de trituración de las principales marcas del mercado.', items: ['Diagnóstico técnico', 'Supervisión de reparaciones', 'Informes técnicos', 'Asistencia técnica en campo'] },
        { title: 'Optimización de la Producción', desc: 'Mejoramos el desempeño de la planta mediante el análisis integral del proceso productivo.', items: ['Identificación de cuellos de botella', 'Incremento de la capacidad de producción', 'Reducción del desgaste de componentes', 'Optimización del flujo de proceso'] },
        { title: 'Gestión de Costos e Inventario de Repuestos', desc: 'Reducimos el capital inmovilizado sin comprometer la continuidad de la producción.', items: ['Inventario de seguridad', 'Clasificación de repuestos críticos', 'Gestión de proveedores', 'Reducción de costos operativos'] },
        { title: 'Ingeniería y Desarrollo de Proyectos', desc: 'Desarrollamos soluciones técnicas personalizadas para fabricación y mejoras industriales.', items: ['Planos técnicos', 'Proyectos mecánicos', 'Ingeniería de fabricación', 'Informes técnicos'] },
        { title: 'Capacitación Técnica', desc: 'Capacitamos a los equipos para operar y mantener los equipos con mayor eficiencia.', items: ['Operadores', 'Mecánicos', 'Compradores técnicos', 'Personal de mantenimiento'] },
        { title: 'Consultoría en Compras', desc: 'Brindamos soporte técnico para la adquisición de equipos, repuestos y servicios.', items: ['Especificaciones técnicas', 'Evaluación de proveedores', 'Análisis costo-beneficio', 'Seguimiento de fabricación'] },
        { title: 'Reparación y Comercialización de Equipos', desc: 'Acompañamos proyectos de reparación y suministro de equipos nuevos y usados.', items: ['Reparación de trituradoras', 'Recuperación de componentes', 'Equipos nuevos', 'Equipos usados'] },
      ],
      techKicker: 'Tecnología', techTitle: 'Tecnología especializada que genera performance.',
      techBody: 'Unimos experiencia de campo y herramientas modernas para monitorear, analizar y optimizar cada proceso — convirtiendo datos en decisiones que impulsan resultados.',
      techPoints: ['Monitoreo y análisis de procesos', 'Decisiones orientadas por datos', 'Mejora continua de la operación'],
    };
    const L = lang === 'es' ? es : pt;
    return { L, services: L.services.map((s, i) => ({ ...s, delay: (i % 2) * 90 })), techPoints: L.techPoints };
  }
}

</script>
</body>
</html>
